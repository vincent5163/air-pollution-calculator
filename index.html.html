<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>營建工程空氣污染防制費 111年新費率試算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #0ea5e9;
    --sky-dark: #0284c7;
    --sky-light: #e0f2fe;
    --ink: #0f172a;
    --ink-soft: #334155;
    --dust: #94a3b8;
    --paper: #f8fafc;
    --white: #ffffff;
    --green: #10b981;
    --amber: #f59e0b;
    --red: #ef4444;
    --surface: #f1f5f9;
    --border: #e2e8f0;
    --shadow: 0 4px 24px rgba(15,23,42,0.08);
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--paper);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: var(--ink);
    color: white;
    padding: 28px 32px 24px;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      -45deg,
      transparent, transparent 40px,
      rgba(14,165,233,0.06) 40px, rgba(14,165,233,0.06) 41px
    );
  }
  .header-inner {
    position: relative;
    max-width: 760px;
    margin: 0 auto;
  }
  .badge {
    display: inline-block;
    background: var(--sky);
    color: white;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    padding: 4px 10px;
    border-radius: 4px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  header h1 {
    font-size: clamp(20px, 4vw, 28px);
    font-weight: 900;
    line-height: 1.3;
    letter-spacing: -0.5px;
  }
  header p {
    margin-top: 8px;
    color: var(--dust);
    font-size: 14px;
    font-weight: 300;
  }

  /* ── LAYOUT ── */
  main {
    max-width: 760px;
    margin: 0 auto;
    padding: 32px 16px 64px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  /* ── CARD ── */
  .card {
    background: var(--white);
    border-radius: var(--radius);
    border: 1px solid var(--border);
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 20px 24px 16px;
    border-bottom: 1px solid var(--border);
  }
  .step-num {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--sky);
    color: white;
    font-size: 14px;
    font-weight: 900;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .card-header h2 {
    font-size: 15px;
    font-weight: 700;
    color: var(--ink);
  }
  .card-body { padding: 20px 24px; }

  /* ── FORM ELEMENTS ── */
  label {
    display: block;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-soft);
    margin-bottom: 6px;
  }
  input[type="number"], input[type="text"], select {
    width: 100%;
    padding: 10px 14px;
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: inherit;
    font-size: 14px;
    color: var(--ink);
    background: var(--white);
    transition: border-color 0.15s, box-shadow 0.15s;
    outline: none;
  }
  input:focus, select:focus {
    border-color: var(--sky);
    box-shadow: 0 0 0 3px rgba(14,165,233,0.12);
  }
  input::placeholder { color: var(--dust); }

  .field-group { margin-bottom: 16px; }
  .field-group:last-child { margin-bottom: 0; }

  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }

  .hint {
    font-size: 12px;
    color: var(--dust);
    margin-top: 5px;
    line-height: 1.5;
  }

  /* ── TYPE GRID ── */
  .type-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
  }
  .type-btn {
    border: 1.5px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    cursor: pointer;
    background: var(--white);
    text-align: center;
    transition: all 0.15s;
    font-family: inherit;
  }
  .type-btn:hover { border-color: var(--sky); background: var(--sky-light); }
  .type-btn.active {
    border-color: var(--sky);
    background: var(--sky);
    color: white;
  }
  .type-btn .code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 18px;
    font-weight: 700;
    display: block;
    margin-bottom: 4px;
  }
  .type-btn .name {
    font-size: 12px;
    line-height: 1.3;
  }

  /* ── DATE INPUTS ── */
  .date-row {
    display: grid;
    grid-template-columns: 80px 70px 70px auto;
    gap: 8px;
    align-items: end;
  }
  .date-label { font-size: 13px; font-weight: 500; color: var(--ink-soft); margin-bottom: 6px; }
  .period-display {
    background: var(--sky-light);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--sky-dark);
    font-weight: 600;
    white-space: nowrap;
    font-family: 'JetBrains Mono', monospace;
  }

  /* ── AREA INPUT PANEL ── */
  .area-panel { display: none; }
  .area-panel.show { display: block; }

  /* ── RESULT ── */
  .result-card {
    background: linear-gradient(135deg, var(--ink) 0%, #1e3a5f 100%);
    border-radius: var(--radius);
    padding: 28px 24px;
    color: white;
    position: relative;
    overflow: hidden;
  }
  .result-card::after {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(14,165,233,0.15);
  }
  .result-label { font-size: 13px; color: var(--dust); margin-bottom: 4px; }
  .result-type { font-size: 16px; font-weight: 700; margin-bottom: 20px; color: #7dd3fc; }
  .result-amount {
    font-family: 'JetBrains Mono', monospace;
    font-size: clamp(32px, 6vw, 48px);
    font-weight: 700;
    color: white;
    letter-spacing: -1px;
  }
  .result-amount span { font-size: 18px; color: var(--dust); margin-right: 6px; }
  .result-meta {
    margin-top: 20px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.1);
  }
  .meta-item .meta-label { font-size: 11px; color: var(--dust); text-transform: uppercase; letter-spacing: 1px; }
  .meta-item .meta-val { font-size: 14px; font-weight: 600; margin-top: 3px; font-family: 'JetBrains Mono', monospace; }

  .level-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 8px;
  }
  .level-1 { background: var(--green); color: white; }
  .level-2 { background: var(--amber); color: white; }
  .level-3 { background: var(--red); color: white; }

  .no-result {
    text-align: center;
    padding: 40px 20px;
    color: var(--dust);
    font-size: 14px;
  }
  .no-result-icon { font-size: 36px; margin-bottom: 10px; }

  /* ── RATE TABLE ── */
  .rate-table { width: 100%; border-collapse: collapse; font-size: 13px; }
  .rate-table th {
    background: var(--surface);
    padding: 8px 12px;
    text-align: left;
    font-weight: 600;
    color: var(--ink-soft);
    border-bottom: 2px solid var(--border);
  }
  .rate-table td {
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .rate-table tr.active-row { background: var(--sky-light); }
  .rate-table tr.active-row td { font-weight: 700; color: var(--sky-dark); }
  .rate-table .name-col { font-family: 'Noto Sans TC', sans-serif; font-size: 12px; }

  /* ── BUTTON ── */
  .btn-calc {
    width: 100%;
    background: var(--sky);
    color: white;
    border: none;
    border-radius: 12px;
    padding: 14px;
    font-family: inherit;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    letter-spacing: 1px;
  }
  .btn-calc:hover { background: var(--sky-dark); }
  .btn-calc:active { transform: scale(0.98); }

  /* ── TOGGLE ── */
  details > summary {
    cursor: pointer;
    font-size: 13px;
    color: var(--sky);
    font-weight: 500;
    padding: 8px 0;
    list-style: none;
  }
  details > summary::before { content: '▶ '; font-size: 10px; }
  details[open] > summary::before { content: '▼ '; }

  .inline-row { display: flex; gap: 8px; align-items: end; }
  .inline-row > * { flex: 1; }

  @media (max-width: 500px) {
    .row3 { grid-template-columns: 1fr 1fr; }
    .date-row { grid-template-columns: 70px 60px 60px; }
    .date-row .period-display { display: none; }
    .result-meta { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="badge">111年新費率</div>
    <h1>營建工程空氣污染防制費<br>簡易試算</h1>
    <p>依環保署111年修正費率計算，僅供估算參考</p>
  </div>
</header>

<main>

  <!-- STEP 1: 工程類別 -->
  <div class="card">
    <div class="card-header">
      <div class="step-num">1</div>
      <h2>選擇營建工程類別</h2>
    </div>
    <div class="card-body">
      <div class="type-grid" id="typeGrid"></div>
    </div>
  </div>

  <!-- STEP 2: 工期 -->
  <div class="card" id="step2Card" style="display:none">
    <div class="card-header">
      <div class="step-num">2</div>
      <h2>填入施工工期（民國年）</h2>
    </div>
    <div class="card-body">
      <div class="field-group">
        <div class="date-label">預計開工日</div>
        <div class="date-row">
          <div>
            <label>年</label>
            <input type="number" id="startY" placeholder="111" min="100" max="200">
          </div>
          <div>
            <label>月</label>
            <input type="number" id="startM" placeholder="1" min="1" max="12">
          </div>
          <div>
            <label>日</label>
            <input type="number" id="startD" placeholder="1" min="1" max="31">
          </div>
          <div id="periodBox" class="period-display" style="display:none"></div>
        </div>
      </div>
      <div class="field-group">
        <div class="date-label">預計完工日</div>
        <div class="date-row">
          <div>
            <label>年</label>
            <input type="number" id="endY" placeholder="112" min="100" max="200">
          </div>
          <div>
            <label>月</label>
            <input type="number" id="endM" placeholder="6" min="1" max="12">
          </div>
          <div>
            <label>日</label>
            <input type="number" id="endD" placeholder="30" min="1" max="31">
          </div>
        </div>
      </div>
      <div class="hint" id="periodHint">請填入開工及完工日期後自動計算工期</div>
    </div>
  </div>

  <!-- STEP 3: 面積/體積/經費 -->
  <div class="card" id="step3Card" style="display:none">
    <div class="card-header">
      <div class="step-num">3</div>
      <h2 id="step3Title">填入面積 / 體積 / 合約經費</h2>
    </div>
    <div class="card-body" id="step3Body"></div>
  </div>

  <!-- CALCULATE BUTTON -->
  <button class="btn-calc" id="calcBtn" onclick="calculate()" style="display:none">
    ▶ 開始試算
  </button>

  <!-- RESULT -->
  <div id="resultArea"></div>

  <!-- RATE TABLE -->
  <div class="card">
    <div class="card-header">
      <div class="step-num" style="background:var(--ink)">表</div>
      <h2>111年費率對照表</h2>
    </div>
    <div class="card-body" style="padding:0;overflow-x:auto">
      <table class="rate-table" id="rateTable">
        <thead>
          <tr>
            <th>代碼</th>
            <th class="name-col">工程類別</th>
            <th>第一級</th>
            <th>第二級</th>
            <th>第三級</th>
            <th>單位</th>
          </tr>
        </thead>
        <tbody id="rateBody"></tbody>
      </table>
    </div>
  </div>

</main>

<script>
// ── DATA ──
const TYPES = [
  { code:'1', name:'建築(RC)', unit:'平方公尺×月', rates:[2.47,2.65,5.9],    thresholds:[3500,null], dim:'area', monthly:true  },
  { code:'2', name:'建築(SRC)',unit:'平方公尺×月', rates:[2.54,2.82,5.63],   thresholds:[3500,null], dim:'area', monthly:true  },
  { code:'3', name:'拆除工程', unit:'平方公尺',    rates:[0.49,0.56,1.06],   thresholds:[3500,null], dim:'area', monthly:false },
  { code:'4', name:'道路工程', unit:'平方公尺×月', rates:[1.43,1.59,3.18],   thresholds:[30000,null],dim:'area', monthly:true  },
  { code:'5', name:'隧道工程', unit:'平方公尺×月', rates:[2.08,2.42,4.24],   thresholds:[227000,null],dim:'area',monthly:true  },
  { code:'6', name:'管線工程', unit:'平方公尺×月', rates:[2.42,2.99,4.75],   thresholds:[3000,null], dim:'area', monthly:true  },
  { code:'7', name:'橋樑工程', unit:'平方公尺×月', rates:[0.24,0.28,0.51],   thresholds:[350000,null],dim:'area',monthly:true  },
  { code:'8', name:'區域開發(社區)', unit:'公頃×月',rates:[5787,7060,11574], thresholds:[600,null],  dim:'hectare',monthly:true},
  { code:'9', name:'區域開發(工業區)',unit:'公頃×月',rates:[5787,7060,11574],thresholds:[600,null],  dim:'hectare',monthly:true},
  { code:'A', name:'區域開發(遊樂區)',unit:'公頃×月',rates:[4350,5306,8699], thresholds:[600,null],  dim:'hectare',monthly:true},
  { code:'B', name:'疏濬工程', unit:'立方公尺',    rates:[5.1,6.07,8.9],     thresholds:[10000,null],dim:'volume',monthly:false},
  { code:'Z', name:'其他營建', unit:'元(合約)',     rates:[0.0028,0.0035,0.0054],thresholds:[1800000,null],dim:'contract',monthly:false},
];

// Level 1 thresholds (施工規模 = area×month or volume)
// Level 2 = 施算空污費 >= 2000
// Level 3 = 施算空污費 < 2000 OR non-applicable

// ── BUILD TYPE GRID ──
const grid = document.getElementById('typeGrid');
TYPES.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'type-btn';
  btn.dataset.code = t.code;
  btn.innerHTML = `<span class="code">${t.code}</span><span class="name">${t.name}</span>`;
  btn.onclick = () => selectType(t.code);
  grid.appendChild(btn);
});

// ── BUILD RATE TABLE ──
const rateBody = document.getElementById('rateBody');
TYPES.forEach(t => {
  const tr = document.createElement('tr');
  tr.id = 'row_' + t.code;
  tr.innerHTML = `
    <td style="font-weight:700;font-size:16px">${t.code}</td>
    <td class="name-col">${t.name}</td>
    <td>${t.rates[0]}</td>
    <td>${t.rates[1]}</td>
    <td>${t.rates[2]}</td>
    <td style="font-family:'Noto Sans TC';font-size:11px">${t.unit}</td>`;
  rateBody.appendChild(tr);
});

// ── STATE ──
let selectedCode = null;
let months = 0, days = 0;

function selectType(code) {
  selectedCode = code;
  document.querySelectorAll('.type-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.code === code);
  });
  document.querySelectorAll('.rate-table tr').forEach(r => r.classList.remove('active-row'));
  const row = document.getElementById('row_' + code);
  if (row) { row.classList.add('active-row'); row.scrollIntoView({ block:'nearest' }); }

  document.getElementById('step2Card').style.display = '';
  buildStep3(code);
  document.getElementById('step3Card').style.display = '';
  document.getElementById('calcBtn').style.display = '';
  document.getElementById('resultArea').innerHTML = '';
}

// ── DATE CALCULATION ──
function rocToDate(y, m, d) {
  return new Date(y + 1911, m - 1, d);
}
function calcPeriod() {
  const sy = +document.getElementById('startY').value;
  const sm = +document.getElementById('startM').value;
  const sd = +document.getElementById('startD').value;
  const ey = +document.getElementById('endY').value;
  const em = +document.getElementById('endM').value;
  const ed = +document.getElementById('endD').value;
  if (!sy || !sm || !sd || !ey || !em || !ed) return;

  const s = rocToDate(sy, sm, sd);
  const e = rocToDate(ey, em, ed);
  if (e <= s) { document.getElementById('periodHint').textContent = '⚠ 完工日必須晚於開工日'; return; }

  const diffMs = e - s;
  const diffDays = Math.ceil(diffMs / 86400000);
  months = diffDays / 30.4375; // average month
  days = diffDays;

  const mFloor = Math.floor(months);
  const dRem = diffDays - mFloor * 30;

  document.getElementById('periodHint').textContent =
    `工期：約 ${mFloor} 個月 ${dRem > 0 ? dRem + ' 天' : ''}（共 ${diffDays} 日，折算 ${months.toFixed(2)} 月）`;

  const box = document.getElementById('periodBox');
  box.style.display = '';
  box.textContent = `≈ ${months.toFixed(1)} 月`;
}

['startY','startM','startD','endY','endM','endD'].forEach(id => {
  document.getElementById(id).addEventListener('input', calcPeriod);
});

// ── STEP 3 BUILDER ──
function buildStep3(code) {
  const t = TYPES.find(x => x.code === code);
  const body = document.getElementById('step3Body');
  body.innerHTML = '';

  if (code === 'B') {
    body.innerHTML = `
      <div class="field-group">
        <label>外運土石體積（鬆方，立方公尺）</label>
        <input type="number" id="inp_vol" placeholder="例：15000" min="0">
        <div class="hint">鬆方係指受疏濬開採作業所擾動之土石體積</div>
      </div>
      <details style="margin-top:12px">
        <summary>換算工具（選填）</summary>
        <div style="margin-top:12px">
          <div class="row" style="margin-bottom:10px">
            <div>
              <label>實方體積（立方公尺）</label>
              <input type="number" id="inp_solid" placeholder="實方" min="0" oninput="convertVol('solid')">
            </div>
            <div>
              <label>鬆實方比值</label>
              <input type="number" id="inp_ratio" value="1.31" step="0.01" min="0" oninput="convertVol('ratio')">
            </div>
          </div>
          <div class="row">
            <div>
              <label>鬆方重量（公噸）</label>
              <input type="number" id="inp_ton" placeholder="公噸" min="0" oninput="convertVol('ton')">
            </div>
            <div>
              <label>鬆方密度（t/m³）</label>
              <input type="number" id="inp_density" value="1.51" step="0.01" min="0" oninput="convertVol('density')">
            </div>
          </div>
        </div>
      </details>`;
  } else if (code === 'Z') {
    body.innerHTML = `
      <div class="field-group">
        <label>工程合約經費（元，不含稅）</label>
        <input type="number" id="inp_contract" placeholder="例：3,000,000" min="0">
        <div class="hint">不含營業稅；已詳列不涉粒狀污染物排放之設備費或材料費可扣除</div>
      </div>`;
  } else if (code === '8' || code === '9' || code === 'A') {
    body.innerHTML = `
      <div class="field-group">
        <label>施工面積（公頃）</label>
        <input type="number" id="inp_ha" placeholder="例：2.5" min="0" step="0.01">
        <div class="hint">區域開發工程以公頃計；需具備施工規模≥6,000,000 ㎡×月（即≥600公頃×月）</div>
      </div>`;
  } else if (code === '3') {
    body.innerHTML = `
      <div class="field-group">
        <label>總樓地板面積（平方公尺）</label>
        <input type="number" id="inp_area" placeholder="例：5000" min="0">
        <div class="hint">拆除工程：填寫預計拆除之總樓地板面積，不計月數</div>
      </div>`;
  } else {
    const areaLabel = {
      '1':'建築面積（平方公尺）',
      '2':'建築面積（平方公尺）',
      '4':'施工面積（平方公尺）',
      '5':'隧道平面面積（平方公尺）',
      '6':'施工面積（平方公尺）',
      '7':'施工面積（平方公尺）',
    }[code] || '面積（平方公尺）';
    body.innerHTML = `
      <div class="field-group">
        <label>${areaLabel}</label>
        <input type="number" id="inp_area" placeholder="例：5000" min="0">
        <div class="hint">施工規模 = 面積 × 工期(月)</div>
      </div>`;
  }
}

// ── VOLUME CONVERSION ──
function convertVol(from) {
  const ratio = +document.getElementById('inp_ratio').value || 1.31;
  const density = +document.getElementById('inp_density').value || 1.51;
  if (from === 'solid') {
    const v = +document.getElementById('inp_solid').value;
    const loose = v * ratio;
    document.getElementById('inp_vol').value = loose.toFixed(2);
  } else if (from === 'ton') {
    const w = +document.getElementById('inp_ton').value;
    const loose = w / density;
    document.getElementById('inp_vol').value = loose.toFixed(2);
  }
}

// ── CALCULATE ──
function calculate() {
  if (!selectedCode) { alert('請先選擇工程類別'); return; }
  const t = TYPES.find(x => x.code === selectedCode);

  // Get inputs
  let area = 0, scale = 0, fee = 0, inputLabel = '', scaleLabel = '';

  if (selectedCode === 'B') {
    area = +document.getElementById('inp_vol').value || 0;
    scale = area;
    inputLabel = `${area.toLocaleString()} 立方公尺`;
    scaleLabel = `${scale.toLocaleString()} 立方公尺`;
  } else if (selectedCode === 'Z') {
    area = +document.getElementById('inp_contract').value || 0;
    scale = area;
    inputLabel = `NT$ ${area.toLocaleString()}`;
    scaleLabel = `NT$ ${scale.toLocaleString()}`;
  } else if (selectedCode === '8' || selectedCode === '9' || selectedCode === 'A') {
    area = +document.getElementById('inp_ha').value || 0;
    scale = t.monthly ? area * months : area;
    inputLabel = `${area} 公頃`;
    scaleLabel = `${scale.toFixed(2)} 公頃×月`;
  } else if (selectedCode === '3') {
    area = +document.getElementById('inp_area').value || 0;
    scale = area;
    inputLabel = `${area.toLocaleString()} 平方公尺`;
    scaleLabel = `${scale.toLocaleString()} 平方公尺`;
  } else {
    area = +document.getElementById('inp_area').value || 0;
    scale = t.monthly ? area * months : area;
    inputLabel = `${area.toLocaleString()} 平方公尺`;
    scaleLabel = `${scale.toFixed(0)} 平方公尺×月`;
  }

  if (area <= 0) { alert('請填入有效的面積/體積/經費'); return; }
  if (t.monthly && months <= 0) { alert('請填入施工工期'); return; }

  // Determine level
  const threshold1 = t.thresholds[0];
  let level;

  if (scale < threshold1) {
    // Below threshold: third-level rate, check if fee >= 2000
    const trial = area * t.rates[2] * (t.monthly ? months : 1);
    level = trial < 2000 ? 'N' : 3; // N = not applicable
  } else {
    // Above threshold: calc 3rd rate fee first
    const trial3 = area * t.rates[2] * (t.monthly ? months : 1);
    if (trial3 >= 2000) {
      // Could be level 1 or 2
      // Level 1 threshold varies by type - simplify: use scale >= threshold1 * 2 heuristic
      // Actually per regulation: Level 1 has specific larger thresholds not all shown
      // For simplification: if scale >= threshold1 → level 1 or 2
      // We'll classify: scale >= threshold1 → level 2 default
      // (A more nuanced classification needs the full table with L1 specific thresholds)
      // Level 1 thresholds from 對照表:
      const L1_thresholds = {
        '1': Infinity, // RC no separate L1 shown — uses same
        '2': Infinity,
        '3': Infinity,
        '4': Infinity,
        '5': Infinity,
        '6': Infinity,
        '7': Infinity,
        '8': Infinity,
        '9': Infinity,
        'A': Infinity,
        'B': Infinity,
        'Z': Infinity,
      };
      // Actually from reading: 對照表 L1 threshold = first shown value, L2 = smaller than that
      // The spreadsheet seems to have only one threshold dividing "above" from "below"
      // Let's use: scale >= threshold1 → Level 2; user can pick Level 1 manually
      level = 2;
    } else {
      level = 'N';
    }
  }

  // Determine rate and fee
  let rate, levelText, levelClass;
  if (level === 'N' || level === 3) {
    rate = t.rates[2];
    levelText = level === 'N' ? '第三級（空污費 < 2,000元，免繳或適用最低費）' : '第三級';
    levelClass = 'level-3';
    level = 3;
  } else if (level === 1) {
    rate = t.rates[0];
    levelText = '第一級';
    levelClass = 'level-1';
  } else {
    rate = t.rates[1];
    levelText = '第二級';
    levelClass = 'level-2';
  }

  fee = area * rate * (t.monthly ? months : 1);

  // Check minimum 2000
  let feeNote = '';
  if (fee < 2000 && fee > 0) {
    feeNote = '（依規定低於2,000元者免繳或依最低額計算，請洽主管機關）';
  }

  // Display
  const resultArea = document.getElementById('resultArea');
  resultArea.innerHTML = `
    <div class="result-card">
      <div class="result-label">試算結果</div>
      <div class="result-type">${t.name} 工程</div>
      <div class="result-amount">
        <span>NT$</span>${Math.ceil(fee).toLocaleString()}
      </div>
      <div style="font-size:13px;color:#94a3b8;margin-top:6px">${feeNote}</div>
      <div class="level-badge ${levelClass}" style="margin-top:12px">${levelText}</div>
      <div class="result-meta">
        <div class="meta-item">
          <div class="meta-label">費率</div>
          <div class="meta-val">${rate} <small style="font-family:'Noto Sans TC';font-size:10px">${t.unit.replace('×月','').replace('元(合約)','元/元合約')}/月</small></div>
        </div>
        <div class="meta-item">
          <div class="meta-label">工期</div>
          <div class="meta-val">${t.monthly ? months.toFixed(2) + ' 月' : '不計月'}</div>
        </div>
        <div class="meta-item">
          <div class="meta-label">施工規模</div>
          <div class="meta-val" style="font-size:11px">${scaleLabel}</div>
        </div>
      </div>
    </div>
    <div style="font-size:12px;color:var(--dust);text-align:center;margin-top:12px;line-height:1.7">
      ⚠ 本試算結果僅供估算參考，正式繳費金額以主管機關核定為準。<br>
      工地等級劃分需對照完整施工規模等級表，建議向環保局確認。
    </div>`;

  // Highlight active row in table
  document.querySelectorAll('.rate-table tr').forEach(r => r.classList.remove('active-row'));
  const row = document.getElementById('row_' + selectedCode);
  if (row) row.classList.add('active-row');

  resultArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}
</script>
